<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article data-testid="test-todo-card" class="todo-card">
         <div class="display-mode">
      <div class="card-header">
        <label
          for="todo-complete"
          class="toggle-label"
          aria-label="Mark task as complete"
        >
          <input
            type="checkbox"
            id="todo-complete"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <h2 data-testid="test-todo-title" class="todo-title">Task Title</h2>
        <span
          data-testid="test-todo-priority-indicator"
          class="priority-indicator"
          aria-hidden="true"
        ></span>
        <span
          data-testid="test-todo-priority"
          class="priority-badge priority-high"
        >
          High
        </span>
      </div>

   
        <div
          data-testid="test-todo-collapsible-section"
          class="collapsible-section"
        >
          <p data-testid="test-todo-description" class="todo-description">
            Task Description
          </p>
        </div>
        <button
          data-testid="test-todo-expand-toggle"
          class="expand-toggle hidden"
          aria-expanded="false"
          aria-label="Expand description"
        >
          Show more
        </button>
        
        
       
          <span
          data-testid="test-todo-status"
          class="status-badge status-inprogress"
          aria-label="Task status"
        >
          In Progress
        </span>
        

          <!-- <label for="status-control" class="sr-only">Change status</label>
          <select
            id="status-control"
            data-testid="test-todo-status-control"
            class="status-control"
            aria-label="Change task status"
          >
            <option value="pending">Pending</option>
            <option value="inprogress" selected>In Progress</option>
            <option value="done">Done</option>
          </select> -->
      

        <div class="time-info">
          <time data-testid="test-todo-due-date" class="due-date" datetime="">
            Due Apr 16, 2026
          </time>
          <time
            data-testid="test-todo-time-remaining"
            class="time-remaining"
            datetime=""
          >
            Due in 5 days
          </time>
          <span
            data-testid="test-todo-overdue-indicator"
            class="overdue-indicator hidden"
            aria-live="polite"
          >
            ⚠️ Overdue
          </span>
        </div>
        <ul
          data-testid="test-todo-tags"
          class="tags-list"
          role="list"
          aria-label="Task categories"
        >
          <li data-testid="test-todo-tag-design" class="tag">Design</li>
          <li data-testid="test-todo-tag-ux" class="tag">UX</li>
          <li data-testid="test-todo-tag-frontend" class="tag">Frontend</li>
        </ul>

        <div class="card-actions">
          <button
            data-testid="test-todo-edit-button"
            class="btn-edit"
            aria-label="Edit task"
          >
            Edit
          </button>

          <button
            data-testid="test-todo-delete-button"
            class="btn-delete"
            aria-label="Delete task"
          >
            Delete
          </button>
        </div>
      </div>

      <!-- ========================
           EDIT MODE FORM
           Hidden by default.
           JS shows this when Edit is clicked.
      ======================== -->
      
      <div
        data-testid="test-todo-edit-form"
        class="edit-form hidden"
        role="form"
        aria-label="Edit task form"
      >
       <h2 data-testid="test-todo-title" class="edit-heading">Edit Task</h2>
        <!-- Title input -->
        <div class="form-group">
          <label for="edit-title">Title</label>
          <input
            type="text"
            id="edit-title"
            data-testid="test-todo-edit-title-input"
            class="form-input"
            placeholder="Task title"
          />
        </div>

        <!-- Description textarea -->
        <div class="form-group">
          <label for="edit-description">Description</label>
          <textarea
            id="edit-description"
            data-testid="test-todo-edit-description-input"
            class="form-input form-textarea"
            placeholder="Task description"
            rows="3"
          ></textarea>
        </div>

 <div class="form-group">
<label for="status-control" class="form-label">Status</label>
          <select
            id="status-control"
            data-testid="test-todo-status-control"
            class="status-control"
            aria-label="Change task status"
          >
            <option value="pending">Pending</option>
            <option value="inprogress" selected>In Progress</option>
            <option value="done">Done</option>
          </select>
 </div>
        

        <!-- Priority select -->
        <div class="form-group">
          <label for="edit-priority">Priority</label>
          <select
            id="edit-priority"
            data-testid="test-todo-edit-priority-select"
            class="form-input form-select"
          >
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high" selected>High</option>
          </select>
        </div>

        <!-- Due date input -->
        <div class="form-group">
          <label for="edit-due-date">Due Date</label>
          <input
            type="date"
            id="edit-due-date"
            data-testid="test-todo-edit-due-date-input"
            class="form-input"
          />
        </div>

        <!-- Save and Cancel buttons -->
        <div class="form-actions">
          <button
            data-testid="test-todo-save-button"
            class="btn-save"
            aria-label="Save changes"
          >
            Save
          </button>
          <button
            data-testid="test-todo-cancel-button"
            class="btn-cancel"
            aria-label="Cancel editing"
          >
            Cancel
          </button>
        </div>
      </div>
      <!-- END EDIT FORM -->
    </article>

    <script src="script.js"></script>
  </body>
</html>
